<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Netcore Cloud Presales Workstation — AI-powered solution consulting toolkit">
    <title>Presales Workstation | Netcore Cloud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="src/styles/app.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="src/styles/sidebar.css">
    <link rel="stylesheet" href="src/styles/modules.css">
    <link rel="stylesheet" href="src/styles/components.css">
    <link rel="stylesheet" href="src/styles/animations.css">
</head>

<body>
    <div id="app">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">NC Workstation</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                    <span class="toggle-icon">◀</span>
                </button>
            </div>

            <div class="sidebar-nav">
                <div class="nav-group">
                    <div class="nav-group-label">Strategic</div>
                    <button class="nav-item active" data-module="demo-strategy">
                        <span class="nav-icon">🎯</span>
                        <span class="nav-label">Demo Strategy</span>
                    </button>
                    <button class="nav-item" data-module="risk-report">
                        <span class="nav-icon">⚠️</span>
                        <span class="nav-label">Risk Report</span>
                    </button>
                    <button class="nav-item" data-module="value-architecture">
                        <span class="nav-icon">💰</span>
                        <span class="nav-label">Value Architecture</span>
                    </button>
                    <button class="nav-item" data-module="battlecards">
                        <span class="nav-icon">⚔️</span>
                        <span class="nav-label">Battlecards</span>
                    </button>
                    <button class="nav-item" data-module="deal-meddpicc">
                        <span class="nav-icon">📊</span>
                        <span class="nav-label">Deal MEDDPICC</span>
                    </button>
                    <button class="nav-item" data-module="exec-translator">
                        <span class="nav-icon">🎤</span>
                        <span class="nav-label">Exec Translator</span>
                    </button>
                </div>

                <div class="nav-group">
                    <div class="nav-group-label">Technical</div>
                    <button class="nav-item" data-module="campaign-seeder">
                        <span class="nav-icon">🌱</span>
                        <span class="nav-label">Campaign Seeder</span>
                    </button>
                    <button class="nav-item" data-module="tech-utilities">
                        <span class="nav-icon">✉️</span>
                        <span class="nav-label">Tech Utilities</span>
                    </button>

                </div>

                <div class="nav-group">
                    <div class="nav-group-label">Agents</div>
                    <button class="nav-item" data-module="workspace-provisioner">
                        <span class="nav-icon">🏗️</span>
                        <span class="nav-label">Workspace Provisioner</span>
                    </button>
                    <button class="nav-item" data-module="template-generator">
                        <span class="nav-icon">🌐</span>
                        <span class="nav-label">Template Generator</span>
                    </button>
                    <button class="nav-item" data-module="journey-builder">
                        <span class="nav-icon">🗺️</span>
                        <span class="nav-label">Journey Builder</span>
                    </button>
                </div>

                <div class="nav-group">
                    <div class="nav-group-label">System</div>
                    <button class="nav-item" data-module="grounding-engine">
                        <span class="nav-icon">🧠</span>
                        <span class="nav-label">Grounding Engine</span>
                    </button>
                    <button class="nav-item" data-module="settings">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-label">Settings</span>
                    </button>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">SC</div>
                    <span class="user-name" id="user-name">Solution Consultant</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main id="main-content" class="main-content">
            <div id="module-container" class="module-container">
                <!-- Module content rendered here by JS -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>window.ENV = window.ENV || {};</script>
    <script src="src/env.js" onerror="console.log('src/env.js not found, skipping local secrets')"></script>
    <script src="src/config.js"></script>
    <script type="module" src="src/utils/markdownRenderer.js"></script>
    <script type="module" src="src/services/geminiService.js"></script>
    <script type="module" src="src/services/netcoreService.js"></script>
    <script type="module" src="src/services/authService.js"></script>
    <script type="module" src="src/services/slackService.js"></script>
    <script type="module" src="src/modules/demoStrategy.js"></script>
    <script type="module" src="src/modules/riskReport.js"></script>
    <script type="module" src="src/modules/valueArchitecture.js"></script>
    <script type="module" src="src/modules/battlecards.js"></script>
    <script type="module" src="src/modules/dealMeddpicc.js"></script>
    <script type="module" src="src/modules/execTranslator.js"></script>
    <script type="module" src="src/modules/campaignSeeder.js"></script>
    <script type="module" src="src/modules/techUtilities.js"></script>

    <script type="module" src="src/modules/workspaceProvisioner.js"></script>
    <script type="module" src="src/modules/templateGenerator.js"></script>
    <script type="module" src="src/modules/journeyBuilder.js"></script>
    <script type="module" src="src/modules/groundingEngine.js"></script>
    <script type="module" src="src/modules/settings.js"></script>
    <script type="module" src="src/app.js"></script>
</body>

</html>
